spring.application.name=piuda

# DB Connection
spring.datasource.url=jdbc:mysql://localhost:3306/dementia_project
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# hibernate.dialect: Spring Boot 3.x는 자동 감지하므로 명시 불필요 (지정 시 deprecated 경고 발생)

# datasource
spring.jpa.defer-datasource-initialization=true

# JWT
jwt.secret = secret-key-for-hs256-piuda-dementia-project
jwt.expiration = 86400000

# Server
#server.address=0.0.0.0
server.port=8080

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# AWS S3
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.region.static=ap-northeast-2
cloud.aws.s3.bucket=piuda-s3-285870986636-ap-northeast-2-an
cloud.aws.stack.auto=false

# Spring AI - OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.embedding.options.model=text-embedding-3-small

# PostgreSQL - RAG Vector Store (MySQL JPA와 별도 데이터소스)
pgvector.datasource.url=jdbc:postgresql://localhost:5432/piuda_vector
pgvector.datasource.username=postgres
pgvector.datasource.password=${PGVECTOR_PASSWORD}
pgvector.datasource.driver-class-name=org.postgresql.Driver

# Knowledge Base 설정
# true: 앱 시작 시 항상 재인덱싱, false: 이미 데이터 있으면 건너뜀
knowledge.reload-on-startup=true


# 신고 자동 처리 임계값
report.auto-hide-threshold=5
report.auto-delete-threshold=10

# CORS (프로덕션에서는 실제 도메인으로 교체: cors.allowed-origins=https://app.piuda.com)
cors.allowed-origins=*

# Google
google.client-id=${GOOGLE_CLIENT_ID}

# Line (ID Token 검증 시 client_id 필요)
line.client-id=${LINE_CLIENT_ID}