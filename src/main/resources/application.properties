spring.application.name=piuda

# DB Connection
spring.datasource.url=jdbc:mysql://localhost:3306/dementia_project
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# datasource
spring.jpa.defer-datasource-initialization=true

# JWT
jwt.secret = secret-key-for-hs256-piuda-dementia-project
jwt.expiration = 86400000

# Server
#server.address=0.0.0.0
server.port=8080

# AWS S3
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.region.static=ap-northeast-2
cloud.aws.s3.bucket=piuda-s3-285870986636-ap-northeast-2-an
cloud.aws.stack.auto=false

# OpenAI
openai.api-key=${OPENAI_API_KEY}